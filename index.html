<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rapid Captions</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="app.js" defer></script>
</head>
<body>

<div class="settings-backdrop" id="settingsBackdrop" onclick="toggleSettings()"></div>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">R</div>
    <div class="hdr-name">RAPID <span>CAPTIONS</span></div>
    <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="controls-row">
    <div class="product-name-wrap">
      <input type="text" id="productName" placeholder="Product name…" oninput="S.name=this.value;regen()">
    </div>
    <div class="toggle-group">
      <button class="tgl-btn on" id="modeSingle" onclick="setMode('single')">Single</button>
      <button class="tgl-btn" id="modeVariant" onclick="setMode('variant')">Variants</button>
    </div>
  </div>
  <div class="controls-row">
    <div class="toggle-group" style="flex:1;">
      <button class="tgl-btn" id="toneHype" onclick="setTone('hype')" style="flex:1;">Hype</button>
      <button class="tgl-btn on" id="toneBalanced" onclick="setTone('balanced')" style="flex:1;">Balanced</button>
      <button class="tgl-btn" id="tonePro" onclick="setTone('pro')" style="flex:1;">Pro</button>
    </div>
    <div class="toggle-group">
      <button class="tgl-btn on" id="langEn" onclick="setLang('en')">EN</button>
      <button class="tgl-btn" id="langSw" onclick="setLang('sw')">SW</button>
    </div>
  </div>

  <div class="preview-sticky">
    <div class="preview-head">
      <div class="preview-head-left">
        <div class="preview-dot"></div>
        <span class="preview-live">LIVE</span>
        <span class="preview-meta" id="previewMeta"></span>
      </div>
      <div class="preview-right">
        <span class="char-counter" id="charCounter"></span>
        <button class="icon-btn reset-mini" id="resetPill" onclick="resetPreview()" title="Reset">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 1 0 1.8-4.3"/><path d="M2 2v4h4"/></svg>
        </button>
        <button class="icon-btn mini-copy" id="miniCopyBtn" onclick="doCopy()" title="Copy">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3a1.5 1.5 0 0 0-1.5-1.5h-6A1.5 1.5 0 0 0 2 3v6A1.5 1.5 0 0 0 3.5 10.5H5"/></svg>
        </button>
      </div>
    </div>
    <textarea id="previewBox" spellcheck="false" oninput="onPreviewEdit()">Pick a platform and caption type…</textarea>
  </div>
</div>

<div class="settings-panel" id="settingsPanel">
  <div class="fc-title">Your Business Info</div>
  <div class="fld"><label class="fld-lbl">Brand / Handle</label>
    <input type="text" id="cfgHandle" placeholder="e.g. @yourbrand" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">Location</label>
    <input type="text" id="cfgLocation" placeholder="e.g. Dar es Salaam" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">Phone / Contact</label>
    <input type="text" id="cfgPhone" placeholder="e.g. +255 123 456 789" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">Currency</label>
    <input type="text" id="cfgCurrency" placeholder="e.g. USD, TZS" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">Hashtags (for Instagram)</label>
    <input type="text" id="cfgHashtags" placeholder="e.g. #shopnow #deals #kariakoo" oninput="saveCfg()"></div>
  <button class="settings-done" onclick="toggleSettings()">Done</button>
</div>

<div class="wrap">
  <div class="blk" id="netBlk">
    <div class="pill-row">
      <div class="pill-row-label">Platform</div>
      <div class="pills scroll-x" id="netPills"></div>
    </div>
  </div>
  <div class="blk gone" id="typeBlk">
    <div class="pill-row">
      <div class="pill-row-label">Type</div>
      <div class="pills scroll-x" id="typePills"></div>
    </div>
  </div>
  <div id="fieldsArea"></div>
</div>

<div class="action-bar">
  <div class="action-bar-inner">
    <button class="copy-btn" id="copyBtn" onclick="doCopy()">Copy Caption</button>
    <button class="clear-btn" onclick="clearForm()" title="Clear">&#10005;</button>
  </div>
</div>

</body>
</html>
