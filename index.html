<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barongo — Captions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b0b;
  --s1: #141414;
  --s2: #1c1c1c;
  --s3: #252525;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --a: #e8a020;
  --a2: #d44c20;
  --text: #ede9e0;
  --sub: #888880;
  --dim: #555550;
  --green: #3ecf6a;
  --orange: #f59e0b;
  --red: #ef5050;
  --r: 10px;
  --r2: 7px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── HEADER ── */
.hdr {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.hdr-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.hdr-logo {
  width: 30px; height: 30px;
  background: var(--a);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.hdr-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text);
}
.hdr-name span { color: var(--a); }
.product-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.product-name-wrap { flex: 1; position: relative; }
.product-name-wrap input {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  font-size: 15px;
  font-weight: 600;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
}
.product-name-wrap input:focus { border-color: var(--a); }
.product-name-wrap input::placeholder { color: var(--dim); font-weight: 400; }
.mode-toggle {
  display: flex;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
  flex-shrink: 0;
}
.mode-btn {
  padding: 10px 13px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.mode-btn.on { background: var(--a); color: #000; }

/* ── WRAP ── */
.wrap { padding: 0 16px; max-width: 480px; margin: 0 auto; }

/* ── SECTION BLOCK ── */
.blk {
  margin-top: 18px;
  animation: fadeUp 0.2s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.blk-label {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 8px;
}

/* ── PILLS ── */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.pill {
  padding: 8px 14px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 30px;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill:active { transform: scale(0.96); }
.pill.on {
  background: var(--a);
  border-color: var(--a);
  color: #000;
}
.pill.on2 {
  background: transparent;
  border-color: var(--a);
  color: var(--a);
}

/* ── FIELD CARD ── */
.fc {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 10px;
}
.fc-title {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--a);
  margin-bottom: 12px;
}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── INPUT ── */
.fld { margin-bottom: 10px; }
.fld:last-child { margin-bottom: 0; }
.fld-lbl {
  font-size: 11px;
  color: var(--dim);
  font-weight: 600;
  letter-spacing: 0.3px;
  margin-bottom: 5px;
  display: block;
}
input[type="text"],
input[type="number"] {
  width: 100%;
  padding: 10px 12px;
  background: var(--s2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  font-size: 14px;
  font-family: 'Figtree', sans-serif;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
input:focus { border-color: var(--a); }
input::placeholder { color: var(--dim); }

/* ── OG TOGGLE INLINE ── */
.og-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.og-toggle-btn {
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--dim);
  background: none;
  border: 1px dashed var(--border2);
  border-radius: 20px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.og-toggle-btn.on { color: var(--a2); border-color: var(--a2); border-style: solid; }
.og-field { display: none; }
.og-field.show { display: block; }

/* ── STATUS ── */
.status-row { display: flex; gap: 5px; margin-top: 10px; }
.st-btn {
  flex: 1;
  padding: 7px 4px;
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  letter-spacing: 0.3px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--s2);
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.st-btn.g { background: rgba(62,207,106,0.12); border-color: var(--green); color: var(--green); }
.st-btn.o { background: rgba(245,158,11,0.12); border-color: var(--orange); color: var(--orange); }
.st-btn.r { background: rgba(239,80,80,0.12); border-color: var(--red); color: var(--red); }

/* ── RESTOCK ── */
.restock-reveal {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  animation: fadeUp 0.2s ease;
}
.restock-reveal.show { display: block; }

/* ── VARIANT ── */
.variant-card {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 13px;
  margin-bottom: 8px;
  position: relative;
  animation: fadeUp 0.2s ease;
}
.v-label {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--a);
  margin-bottom: 10px;
  padding-right: 32px;
}
.v-del {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(239,80,80,0.1);
  border: none;
  color: var(--red);
  width: 26px; height: 26px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.unit-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.uc {
  padding: 4px 9px;
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
}
.uc.on { background: rgba(232,160,32,0.15); border-color: var(--a); color: var(--a); }
.add-variant-btn {
  width: 100%;
  padding: 11px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: var(--r);
  color: var(--sub);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 4px;
}
.add-variant-btn:active { background: rgba(255,255,255,0.03); }

/* ── DIVIDER ── */
.div { height: 1px; background: var(--border); margin: 10px 0; }

/* ── PREVIEW ── */
.preview-wrap {
  margin-top: 18px;
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--border2);
}
.preview-head {
  background: var(--s2);
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.preview-head-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
}
.preview-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--a); }
.reset-pill {
  font-size: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--a2);
  background: rgba(212,76,32,0.1);
  border: 1px solid var(--a2);
  border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
  display: none;
}
.reset-pill.show { display: block; }
#previewBox {
  width: 100%;
  min-height: 140px;
  padding: 14px;
  background: var(--s1);
  color: #c8c5bc;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  line-height: 1.85;
  border: none;
  outline: none;
  resize: vertical;
  white-space: pre-wrap;
}

/* ── COPY BTN ── */
.copy-btn {
  width: 100%;
  margin-top: 10px;
  padding: 16px;
  background: var(--a);
  color: #000;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.15s;
}
.copy-btn:active { transform: scale(0.98); }
.copy-btn.done { background: var(--green); }

/* ── HIDDEN ── */
.gone { display: none !important; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🛒</div>
    <div class="hdr-name">BARONGO <span>HE</span></div>
  </div>
  <div class="product-row">
    <div class="product-name-wrap">
      <input type="text" id="productName" placeholder="Jina la bidhaa..." oninput="S.name=this.value;regen()">
    </div>
    <div class="mode-toggle">
      <button class="mode-btn on" id="modeSingle" onclick="setMode('single')">Moja</button>
      <button class="mode-btn" id="modeVariant" onclick="setMode('variant')">Varianti</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- NETWORK -->
  <div class="blk" id="netBlk">
    <div class="blk-label">Mtandao</div>
    <div class="pills" id="netPills"></div>
  </div>

  <!-- CAPTION TYPE -->
  <div class="blk gone" id="typeBlk">
    <div class="blk-label">Aina ya Caption</div>
    <div class="pills" id="typePills"></div>
  </div>

  <!-- DYNAMIC FIELDS -->
  <div id="fieldsArea"></div>

  <!-- PREVIEW -->
  <div class="preview-wrap" id="previewWrap">
    <div class="preview-head">
      <div class="preview-head-left">
        <div class="preview-dot"></div>
        Preview
      </div>
      <button class="reset-pill" id="resetPill" onclick="resetPreview()">↺ Reset</button>
    </div>
    <textarea id="previewBox" spellcheck="false" oninput="onPreviewEdit()">Chagua mtandao na aina ya caption...</textarea>
  </div>

  <button class="copy-btn" id="copyBtn" onclick="doCopy()">📋 Nakili Caption</button>

</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S = {
  network: null,
  type: null,
  mode: 'single',
  name: '',
  w: { price: '', qty: '', og: '', ogOn: false, status: 'in_stock' },
  r: { price: '', qty: '', og: '', ogOn: false, status: 'in_stock' },
  flash: { price: '', og: '' },
  restockDate: '',
  restockHeadline: '',
  variants: [],
  variantRestock: '',
  previewEdited: false,
};

const UNITS = ['pc','kg','g','Ltrs','ml','cm','inch','—'];

const SIGNATURE = `───────────────\n🌐 @machimbocomplex\n📍 Kariakoo | Aggrey & Sikukuu\n📞 +255756374915`;

// ═══════════════════════════════════════════════════════
// NETWORKS
// ═══════════════════════════════════════════════════════
const NETWORKS = [
  { id: 'whatsapp',  label: 'WhatsApp',  e: '💬' },
  { id: 'telegram',  label: 'Telegram',  e: '✈️' },
  { id: 'tiktok',    label: 'TikTok',    e: '🎵' },
  { id: 'any',       label: 'Yoyote',    e: '◈'  },
];

// ═══════════════════════════════════════════════════════
// CAPTION REGISTRY
// ═══════════════════════════════════════════════════════
const REGISTRY = [
  {
    id: 'standard',
    label: 'Standard',
    e: '📋',
    nets: ['whatsapp','telegram','any'],
    groups: ['wholesale','retail'],
    build: buildStandard,
  },
  {
    id: 'wholesale_only',
    label: 'Jumla Tu',
    e: '📦',
    nets: ['whatsapp','telegram','any'],
    groups: ['wholesale'],
    build: buildWholesaleOnly,
  },
  {
    id: 'repost',
    label: 'Repost',
    e: '🔄',
    nets: ['whatsapp','telegram','any'],
    groups: ['wholesale','retail'],
    build: buildRepost,
  },
  {
    id: 'flash',
    label: 'Flash Sale',
    e: '⚡',
    nets: ['whatsapp','telegram','any'],
    groups: ['flash','wholesale'],
    build: buildFlash,
  },
  {
    id: 'new_arrival',
    label: 'Bidhaa Mpya',
    e: '✨',
    nets: ['whatsapp','telegram','tiktok','any'],
    groups: ['wholesale','retail'],
    build: buildNewArrival,
  },
  {
    id: 'back_in_stock',
    label: 'Imerudishwa',
    e: '🔃',
    nets: ['whatsapp','telegram','any'],
    groups: ['restock_headline','wholesale','retail'],
    build: buildBackInStock,
  },
  {
    id: 'engagement',
    label: 'Engagement',
    e: '🎯',
    nets: ['tiktok','any'],
    groups: [],
    build: buildEngagement,
  },
  {
    id: 'plain',
    label: 'Plain Text',
    e: '📄',
    nets: ['any'],
    groups: ['wholesale','retail'],
    build: buildPlain,
  },
];

// ═══════════════════════════════════════════════════════
// NETWORK & TYPE SELECTION
// ═══════════════════════════════════════════════════════
function initNetworks() {
  const el = document.getElementById('netPills');
  el.innerHTML = NETWORKS.map(n =>
    `<button class="pill" onclick="selectNetwork('${n.id}')" id="net_${n.id}">${n.e} ${n.label}</button>`
  ).join('');
}

function selectNetwork(id) {
  S.network = id;
  document.querySelectorAll('#netPills .pill').forEach(b => b.classList.remove('on'));
  document.getElementById('net_' + id).classList.add('on');
  // if current type not valid for new network, clear it
  if (S.type) {
    const def = REGISTRY.find(r => r.id === S.type);
    if (!def || !def.nets.includes(id)) {
      S.type = null;
    }
  }
  renderTypePills();
  document.getElementById('typeBlk').classList.remove('gone');
}

function renderTypePills() {
  const el = document.getElementById('typePills');
  const available = REGISTRY.filter(r => r.nets.includes(S.network));
  el.innerHTML = available.map(r =>
    `<button class="pill ${S.type === r.id ? 'on' : ''}" onclick="selectType('${r.id}')" id="type_${r.id}">${r.e} ${r.label}</button>`
  ).join('');
}

function selectType(id) {
  S.type = id;
  document.querySelectorAll('#typePills .pill').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('type_' + id);
  if (btn) btn.classList.add('on');
  renderFields();
  regen();
}

// ═══════════════════════════════════════════════════════
// PRODUCT MODE
// ═══════════════════════════════════════════════════════
function setMode(m) {
  S.mode = m;
  document.getElementById('modeSingle').classList.toggle('on', m === 'single');
  document.getElementById('modeVariant').classList.toggle('on', m === 'variant');
  if (S.type) renderFields();
  regen();
}

// ═══════════════════════════════════════════════════════
// FIELD RENDERING ENGINE
// ═══════════════════════════════════════════════════════
function renderFields() {
  const area = document.getElementById('fieldsArea');
  if (!S.type) { area.innerHTML = ''; return; }
  const def = REGISTRY.find(r => r.id === S.type);
  if (!def) { area.innerHTML = ''; return; }

  let html = '<div class="blk" id="fieldsInner">';

  if (S.mode === 'variant') {
    // variant mode: show variant builder for all types that need price groups
    const needsPrices = def.groups.some(g => ['wholesale','retail','flash'].includes(g));
    if (def.groups.includes('restock_headline')) html += htmlRestockHeadline();
    if (def.groups.includes('flash')) html += htmlFlashGroupVariant();
    if (needsPrices) html += htmlVariantSection(def);
    else if (!needsPrices && def.groups.length === 0) {
      // engagement etc — no fields needed
    }
  } else {
    // single mode
    if (def.groups.includes('restock_headline')) html += htmlRestockHeadline();
    if (def.groups.includes('flash')) html += htmlFlashGroup();
    if (def.groups.includes('wholesale')) html += htmlWholesaleGroup();
    if (def.groups.includes('retail')) html += htmlRetailGroup();
  }

  html += '</div>';
  area.innerHTML = html;

  // restore status button states
  if (S.mode === 'single') {
    applyStatus('w', S.w.status);
    applyStatus('r', S.r.status);
    if (S.w.ogOn) { const f = document.getElementById('wOgField'); if(f) f.classList.add('show'); }
    if (S.r.ogOn) { const f = document.getElementById('rOgField'); if(f) f.classList.add('show'); }
    checkRestockVisibility();
  } else {
    renderVariantRows();
  }
}

// ── Wholesale group ──
function htmlWholesaleGroup() {
  return `
  <div class="fc" id="wCard">
    <div class="fc-title">📦 Bei ya Jumla</div>
    <div class="grid2">
      <div class="fld">
        <label class="fld-lbl">Bei (TZS)</label>
        <input type="number" placeholder="150000" value="${S.w.price}" oninput="S.w.price=this.value;regen()">
      </div>
      <div class="fld">
        <label class="fld-lbl">Idadi (pc)</label>
        <input type="number" placeholder="50" value="${S.w.qty}" oninput="S.w.qty=this.value;regen()">
      </div>
    </div>
    <div class="og-row">
      <button class="og-toggle-btn ${S.w.ogOn?'on':''}" id="wOgBtn" onclick="toggleOg('w')">+ Bei ya zamani</button>
    </div>
    <div class="og-field ${S.w.ogOn?'show':''}" id="wOgField">
      <div class="fld">
        <label class="fld-lbl">Bei ya Awali (TZS)</label>
        <input type="number" placeholder="Bei ya zamani" value="${S.w.og}" oninput="S.w.og=this.value;regen()">
      </div>
    </div>
    <div class="fld-lbl" style="margin-top:4px;">Hali ya Stoko</div>
    <div class="status-row">
      <button class="st-btn" id="wSt_in" onclick="setStatus('w','in_stock')">✓ Ipo</button>
      <button class="st-btn" id="wSt_low" onclick="setStatus('w','low_stock')">⚠ Inakwisha</button>
      <button class="st-btn" id="wSt_out" onclick="setStatus('w','out_of_stock')">✕ Haipi</button>
    </div>
    <div class="restock-reveal" id="wRestock">
      <div class="fld">
        <label class="fld-lbl">Tarehe ya Kuja Tena</label>
        <input type="text" placeholder="mf. Aprili 20" value="${S.restockDate}" oninput="S.restockDate=this.value;regen()">
      </div>
    </div>
  </div>`;
}

// ── Retail group ──
function htmlRetailGroup() {
  return `
  <div class="fc" id="rCard">
    <div class="fc-title">🛍️ Bei ya Rejareja</div>
    <div class="grid2">
      <div class="fld">
        <label class="fld-lbl">Bei (TZS)</label>
        <input type="number" placeholder="5500" value="${S.r.price}" oninput="S.r.price=this.value;regen()">
      </div>
      <div class="fld">
        <label class="fld-lbl">Idadi (ikiwa zaidi ya 1)</label>
        <input type="number" placeholder="1" value="${S.r.qty}" oninput="S.r.qty=this.value;regen()">
      </div>
    </div>
    <div class="og-row">
      <button class="og-toggle-btn ${S.r.ogOn?'on':''}" id="rOgBtn" onclick="toggleOg('r')">+ Bei ya zamani</button>
    </div>
    <div class="og-field ${S.r.ogOn?'show':''}" id="rOgField">

// ═══════════════════════════════════════════════════════
// VARIANT MANAGEMENT
// ═══════════════════════════════════════════════════════
function addVariant(v = {}) {
  S.variants.push({
    prefix: v.prefix || '',
    size: v.size || '',
    unit: v.unit || 'pc',
    customUnit: v.customUnit || '',
    wholesale: v.wholesale || '',
    wholesaleQty: v.wholesaleQty || '',
    wOg: v.wOg || '',
    retail: v.retail || '',
    rOg: v.rOg || '',
    flashPrice: v.flashPrice || '',
    flashOg: v.flashOg || '',
    status: v.status || 'in_stock',
  });
  renderVariantRows();
  regen();
}

function removeVariant(i) {
  S.variants.splice(i, 1);
  renderVariantRows();
  regen();
}

function renderVariantRows() {
  const container = document.getElementById('variantRows');
  if (!container) return;
  container.innerHTML = '';
  const def = REGISTRY.find(r => r.id === S.type);
  const isFlash = def && def.groups.includes('flash');

  S.variants.forEach((v, i) => {
    const name = buildVName(v);
    const div = document.createElement('div');
    div.className = 'variant-card';

    let priceHTML = '';
    if (isFlash) {
      priceHTML = `
        <div class="div"></div>
        <div class="grid2">
          <div class="fld">
            <label class="fld-lbl">Bei ya Flash (TZS)</label>
            <input type="number" placeholder="Bei flash" value="${v.flashPrice}"
              oninput="S.variants[${i}].flashPrice=this.value;regen()">
          </div>
          <div class="fld">
            <label class="fld-lbl">Bei ya Kawaida (TZS)</label>
            <input type="number" placeholder="Bei zamani" value="${v.flashOg}"
              oninput="S.variants[${i}].flashOg=this.value;regen()">
          </div>
        </div>`;
    } else {
      priceHTML = `
        <div class="div"></div>
        <div class="grid2">
          <div class="fld">
            <label class="fld-lbl">Bei Jumla (TZS)</label>
            <input type="number" placeholder="150000" value="${v.wholesale}"
              oninput="S.variants[${i}].wholesale=this.value;regen()">
          </div>
          <div class="fld">
            <label class="fld-lbl">Idadi Jumla (pc)</label>
            <input type="number" placeholder="50" value="${v.wholesaleQty}"
              oninput="S.variants[${i}].wholesaleQty=this.value;regen()">
          </div>
        </div>
        <div class="fld">
          <label class="fld-lbl">Bei ya Awali Jumla (hiari)</label>
          <input type="number" placeholder="Bei zamani" value="${v.wOg}"
            oninput="S.variants[${i}].wOg=this.value;regen()">
        </div>
        <div class="div"></div>
        <div class="fld">
          <label class="fld-lbl">Bei Rejareja (TZS)</label>
          <input type="number" placeholder="4000" value="${v.retail}"
            oninput="S.variants[${i}].retail=this.value;regen()">
        </div>
        <div class="fld">
          <label class="fld-lbl">Bei ya Awali Rejareja (hiari)</label>
          <input type="number" placeholder="Bei zamani" value="${v.rOg}"
            oninput="S.variants[${i}].rOg=this.value;regen()">
        </div>`;
    }

    div.innerHTML = `
      <div class="v-label" id="vlabel_${i}">VARIANTI ${i+1}${name?' — '+name:''}</div>
      <button class="v-del" onclick="removeVariant(${i})">✕</button>
      <div class="grid2">
        <div class="fld">
          <label class="fld-lbl">Kiambatisho (hiari)</label>
          <input type="text" placeholder="mf. Spiral" value="${v.prefix}"
            oninput="S.variants[${i}].prefix=this.value;updateVLabel(${i});regen()">
        </div>
        <div class="fld">
          <label class="fld-lbl">Ukubwa / Nambari</label>
          <input type="text" placeholder="mf. 12, L, 90cm" value="${v.size}"
            oninput="S.variants[${i}].size=this.value;updateVLabel(${i});regen()">
        </div>
      </div>
      <div class="fld">
        <label class="fld-lbl">Kipimo</label>
        <div class="unit-chips">
          ${UNITS.map(u=>`<button class="uc ${v.unit===u?'on':''}" onclick="setVUnit(${i},'${u}')">${u==='—'?'Kingine':u}</button>`).join('')}
        </div>
        <input type="text" id="vcu_${i}" placeholder="Andika kipimo" value="${v.customUnit}"
          style="${v.unit!=='—'?'display:none':''}"
          oninput="S.variants[${i}].customUnit=this.value;regen()">
      </div>
      ${priceHTML}
      <div class="fld-lbl" style="margin-top:10px;">Hali ya Stoko</div>
      <div class="status-row">
        <button class="st-btn ${v.status==='in_stock'?'g':''}" onclick="setVStatus(${i},'in_stock')">✓ Ipo</button>
        <button class="st-btn ${v.status==='low_stock'?'o':''}" onclick="setVStatus(${i},'low_stock')">⚠ Inakwisha</button>
        <button class="st-btn ${v.status==='out_of_stock'?'r':''}" onclick="setVStatus(${i},'out_of_stock')">✕ Haipi</button>
      </div>`;

    container.appendChild(div);
  });

  checkVariantRestock();
}

function updateVLabel(i) {
  const el = document.getElementById('vlabel_' + i);
  if (!el) return;
  const name = buildVName(S.variants[i]);
  el.textContent = `VARIANTI ${i+1}${name?' — '+name:''}`;
}

function setVUnit(i, u) {
  S.variants[i].unit = u;
  const ci = document.getElementById('vcu_' + i);
  if (ci) ci.style.display = u === '—' ? 'block' : 'none';
  // update chip classes without full rebuild
  const card = document.getElementById('variantRows').children[i];
  if (card) {
    card.querySelectorAll('.uc').forEach((btn, j) => {
      btn.classList.toggle('on', UNITS[j] === u);
    });
  }
  regen();
}

function setVStatus(i, st) {
  S.variants[i].status = st;
  const card = document.getElementById('variantRows').children[i];
  if (card) {
    const btns = card.querySelectorAll('.status-row .st-btn');
    btns[0].className = 'st-btn' + (st==='in_stock'?' g':'');
    btns[1].className = 'st-btn' + (st==='low_stock'?' o':'');
    btns[2].className = 'st-btn' + (st==='out_of_stock'?' r':'');
  }
  checkVariantRestock();
  regen();
}

function checkVariantRestock() {
  const el = document.getElementById('variantRestockReveal');
  if (!el) return;
  const allOut = S.variants.length > 0 && S.variants.every(v => v.status === 'out_of_stock');
  el.classList.toggle('show', allOut);
}

function buildVName(v) {
  const unit = v.unit === '—' ? v.customUnit : v.unit;
  if (!v.size) return v.prefix || '';
  if (v.prefix) return (unit && unit !== 'pc') ? `${v.prefix}-${v.size} ${unit}` : `${v.prefix}-${v.size}`;
  return (unit && unit !== 'pc') ? `${v.size} ${unit}` : v.size;
}

// ═══════════════════════════════════════════════════════
// STATUS & OG HELPERS
// ═══════════════════════════════════════════════════════
function setStatus(which, val) {
  if (which === 'w') S.w.status = val;
  else S.r.status = val;
  applyStatus(which, val);
  checkRestockVisibility();
  regen();
}

function applyStatus(which, val) {
  ['in','low','out'].forEach(s => {
    const btn = document.getElementById(`${which}St_${s}`);
    if (!btn) return;
    btn.className = 'st-btn';
    if (s==='in' && val==='in_stock') btn.classList.add('g');
    if (s==='low' && val==='low_stock') btn.classList.add('o');
    if (s==='out' && val==='out_of_stock') btn.classList.add('r');
  });
}

function checkRestockVisibility() {
  const def = REGISTRY.find(r => r.id === S.type);
  // only show restock if this type includes wholesale or retail (not back_in_stock which has its own)
  if (!def || def.groups.includes('restock_headline')) return;
  const wOut = S.w.status === 'out_of_stock';
  const rOut = S.r.status === 'out_of_stock';
  const wr = document.getElementById('wRestock');
  const rr = document.getElementById('rRestock');
  if (wr) wr.classList.toggle('show', wOut);
  if (rr) rr.classList.toggle('show', rOut);
}

function toggleOg(which) {
  if (which === 'w') S.w.ogOn = !S.w.ogOn;
  else S.r.ogOn = !S.r.ogOn;
  const field = document.getElementById(which + 'OgField');
  const btn = document.getElementById(which + 'OgBtn');
  const on = which === 'w' ? S.w.ogOn : S.r.ogOn;
  if (field) field.classList.toggle('show', on);
  if (btn) btn.classList.toggle('on', on);
  if (!on) {
    if (which === 'w') S.w.og = '';
    else S.r.og = '';
  }
  regen();
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function fmt(n) {
  if (!n) return n;
  return Number(String(n).replace(/,/g,'')).toLocaleString('en-US');
}

// ═══════════════════════════════════════════════════════
// CAPTION BUILDERS
// ═══════════════════════════════════════════════════════

function getWBlock(useMarkdown=true, mode='standard') {
  // mode: 'standard' | 'wholesale_only'
  const price = S.mode==='single' ? S.w.price : null;
  const qty = S.mode==='single' ? (S.w.qty||'1') : null;
  const og = S.mode==='single' && S.w.ogOn ? S.w.og : '';
  const status = S.mode==='single' ? S.w.status : null;
  if (!price || !qty || status==='out_of_stock') return '';
  const b = useMarkdown;
  let line = og
    ? `📦 ${b?'*':''}Jumla${b?'*':''}\n${b?'~':''}👉 ${qty}pc = TZS ${fmt(og)}${b?'~':''}\n👉 ${qty}pc = ${b?'*':''}TZS ${fmt(price)}${b?'*':''}`
    : `📦 ${b?'*':''}Jumla${b?'*':''}\n👉 ${qty}pc = ${b?'*':''}TZS ${fmt(price)}${b?'*':''}`;
  if (status==='low_stock') line += ' ⚠️';
  return line;
}

function getRBlock(useMarkdown=true) {
  const price = S.mode==='single' ? S.r.price : null;
  const qty = S.mode==='single' ? (S.r.qty||'1') : null;
  const og = S.mode==='single' && S.r.ogOn ? S.r.og : '';
  const status = S.mode==='single' ? S.r.status : null;
  if (!price || status==='out_of_stock') return '';
  const b = useMarkdown;
  let line = og
    ? `🛍️ ${b?'*':''}Rejareja${b?'*':''}\n${b?'~':''}👉 ${qty}pc = TZS ${fmt(og)}${b?'~':''}\n👉 ${qty}pc = ${b?'*':''}TZS ${fmt(price)}${b?'*':''}`
    : `🛍️ ${b?'*':''}Rejareja${b?'*':''}\n👉 ${qty}pc = ${b?'*':''}TZS ${fmt(price)}${b?'*':''}`;
  if (status==='low_stock') line += ' ⚠️';
  return line;
}

function getVariantLines(useMarkdown=true, isFlash=false, isWholesaleOnly=false) {
  const active = S.variants.filter(v => v.status !== 'out_of_stock');
  if (!active.length) return null;
  const b = useMarkdown;
  return active.map(v => {
    const vName = buildVName(v);
    let block = `💰 ${b?'*':''}${vName}${b?'*':''}\n`;
    if (isFlash) {
      if (v.flashOg) block += `${b?'~':''}Bei ya Kawaida: TZS ${fmt(v.flashOg)}${b?'~':''}\n`;
      if (v.flashPrice) block += `⚡ Bei ya Flash: ${b?'*':''}TZS ${fmt(v.flashPrice)}${b?'*':''}`;
    } else {
      if (v.wholesale && v.wholesaleQty) {
        if (v.wOg) {
          block += `📦 ${b?'~':''}Jumla: ${v.wholesaleQty}pc = TZS ${fmt(v.wOg)}${b?'~':''}\n`;
          block += `📦 Jumla: ${v.wholesaleQty}pc = ${b?'*':''}TZS ${fmt(v.wholesale)}${b?'*':''}`;
        } else {
          block += `📦 Jumla: ${v.wholesaleQty}pc = ${b?'*':''}TZS ${fmt(v.wholesale)}${b?'*':''}`;
        }
      }
      if (!isWholesaleOnly && v.retail) {
        if (v.wholesale && v.wholesaleQty) block += '\n';
        if (v.rOg) {
          block += `🛍️ ${b?'~':''}Rejareja: 1pc = TZS ${fmt(v.rOg)}${b?'~':''}\n`;
          block += `🛍️ Rejareja: 1pc = ${b?'*':''}TZS ${fmt(v.retail)}${b?'*':''}`;
        } else {
          block += `🛍️ Rejareja: 1pc = ${b?'*':''}TZS ${fmt(v.retail)}${b?'*':''}`;
        }
      }
    }
    if (v.status === 'low_stock') block += ' ⚠️';
    return block;
  }).join('\n\n');
}

function getOutOfStockBlock(useMarkdown=true) {
  const date = S.mode === 'variant' ? S.variantRestock : S.restockDate;
  if (date) return `📅 ${useMarkdown?'*':''}Inakuja Tena — ${date}${useMarkdown?'*':''}`;
  return `❌ ${useMarkdown?'*':''}Haipatikani Sasa Hivi${useMarkdown?'*':''}`;
}

function isAllOut() {
  if (S.mode === 'variant') return S.variants.length > 0 && S.variants.every(v => v.status === 'out_of_stock');
  return S.w.status === 'out_of_stock' && S.r.status === 'out_of_stock';
}

function assembleSingle(header, body, footer='', md=true) {
  const name = S.name || '—';
  const h = header || `🛒 ${md?'*':''}${name}${md?'*':''}`;
  return `${h}\n───────────────\n\n${body}${footer?'\n\n'+footer:''}\n\n${SIGNATURE}`;
}

// ── 1. Standard ──
function buildStandard() {
  const name = S.name || '—';
  if (S.mode === 'variant') {
    const lines = getVariantLines(true);
    const body = lines || getOutOfStockBlock();
    return assembleSingle(`🛒 *${name}*`, body);
  }
  const wBlock = getWBlock();
  const rBlock = getRBlock();
  const body = [wBlock, rBlock].filter(Boolean).join('\n\n') || getOutOfStockBlock();
  return assembleSingle(`🛒 *${name}*`, body);
}

// ── 2. Wholesale Only ──
function buildWholesaleOnly() {
  const name = S.name || '—';
  if (S.mode === 'variant') {
    const lines = getVariantLines(true, false, true);
    const body = lines || getOutOfStockBlock();
    return assembleSingle(`🛒 *${name}*`, body);
  }
  const wBlock = getWBlock();
  const body = wBlock || getOutOfStockBlock();
  return assembleSingle(`🛒 *${name}*`, body);
}

// ── 3. Repost ──
function buildRepost() {
  const name = S.name || '—';
  if (S.mode === 'variant') {
    const lines = getVariantLines(true);
    const body = lines || getOutOfStockBlock();
    return assembleSingle(
      `🛒 *${name} bado zipo!*`,
      body,
      `Wateja wengi wanaendelea kuchukua 📦\nUsisubiri ziishe — chukua zako sasa! 🔥`
    );
  }
  const wBlock = getWBlock();
  const rBlock = getRBlock();
  const body = [wBlock, rBlock].filter(Boolean).join('\n\n') || getOutOfStockBlock();
  return assembleSingle(
    `🛒 *${name} bado zipo!*`,
    body,
    `Wateja wengi wanaendelea kuchukua 📦\nUsisubiri ziishe — chukua zako sasa! 🔥`
  );
}

// ── 4. Flash Sale ──
function buildFlash() {
  const name = S.name || '—';
  const header = `⚡ *PROMOSHEN YA LEO TU* ⚡`;
  if (S.mode === 'variant') {
    const lines = getVariantLines(true, true);
    const body = lines
      ? `🛒 *${name}*\n\n${lines}`
      : getOutOfStockBlock();
    return `${header}\n───────────────\n\n${body}\n\n⏰ Offer ya muda mfupi\n\n${SIGNATURE}`;
  }
  const fp = S.flash.price;
  const fog = S.flash.og;
  let body = `🛒 *${name}*\n`;
  if (fog) body += `~Bei ya Kawaida: TZS ${fmt(fog)}~\n`;
  if (fp) body += `\n⏰ Offer ya muda mfupi\n👉 *TZS ${fmt(fp)}*`;
  else body += '\n⏰ Offer ya muda mfupi';
  // show regular wholesale below
  const wBlock = getWBlock();
  if (wBlock) body += `\n\n${wBlock}`;
  return `${header}\n───────────────\n\n${body}\n\n${SIGNATURE}`;
}

// ── 5. New Arrival ──
function buildNewArrival() {
  const name = S.name || '—';
  const isTikTok = S.network === 'tiktok';
  if (isTikTok) {
    return `✨ *${name} IMEFIKA!* ✨\n───────────────\n\nBidhaa mpya imefika dukani 🔥\nUnataka bei? Tuandikia moja kwa moja!\n\n${SIGNATURE}`;
  }
  const header = `✨ *${name} — IMEFIKA!*`;
  if (S.mode === 'variant') {
    const lines = getVariantLines(true);
    const body = lines || getOutOfStockBlock();
    return assembleSingle(header, `🆕 Bidhaa Mpya Dukani!\n\n${body}`);
  }
  const wBlock = getWBlock();
  const rBlock = getRBlock();
  const priceBody = [wBlock, rBlock].filter(Boolean).join('\n\n');
  const body = priceBody
    ? `🆕 Bidhaa Mpya Dukani!\n\n${priceBody}`
    : `🆕 Bidhaa Mpya Dukani!`;
  return assembleSingle(header, body);
}

// ── 6. Back in Stock ──
function buildBackInStock() {
  const name = S.name || '—';
  const headline = S.restockHeadline || 'Imerudishwa!';
  const header = `🔃 *${name} — ${headline}*`;
  if (S.mode === 'variant') {
    const lines = getVariantLines(true);
    const body = lines || `Inakuja hivi karibuni...`;
    return assembleSingle(header, `✅ Tena Inapatikana!\n\n${body}`);
  }
  const wBlock = getWBlock();
  const rBlock = getRBlock();
  const priceBody = [wBlock, rBlock].filter(Boolean).join('\n\n');
  const body = priceBody
    ? `✅ Tena Inapatikana!\n\n${priceBody}`
    : `✅ Tena Inapatikana!`;
  return assembleSingle(header, body);
}

  const name = S.name || 'bidhaa hii';

}

// ═══════════════════════════════════════════════════════
// PREVIEW ENGINE
// ═══════════════════════════════════════════════════════
function regen() {
  if (S.previewEdited) return;
  if (!S.type) {
    document.getElementById('previewBox').value = 'Chagua mtandao na aina ya caption...';
    return;
  }
  const def = REGISTRY.find(r => r.id === S.type);
  if (!def) return;
  const text = def.build();
  document.getElementById('previewBox').value = text;
}

function onPreviewEdit() {
  if (!S.type) return;
  S.previewEdited = true;
  document.getElementById('resetPill').classList.add('show');
}

function resetPreview() {
  S.previewEdited = false;
  document.getElementById('resetPill').classList.remove('show');
  regen();
}

// ═══════════════════════════════════════════════════════
// COPY
// ═══════════════════════════════════════════════════════
function doCopy() {
  const text = document.getElementById('previewBox').value;
  if (!text || text === 'Chagua mtandao na aina ya caption...') return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Imenakiliwa!';
    btn.classList.add('done');
    setTimeout(() => {
      btn.textContent = '📋 Nakili Caption';
      btn.classList.remove('done');
    }, 2500);
  });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
initNetworks();
</script>
