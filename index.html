<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Rapid Captions</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="products.js" defer></script>
<script src="app.js" defer></script>
</head>
<body class="no-type">

<div class="backdrop" id="backdrop" onclick="closeAllPanels()"></div>

<header class="stage-top" id="stageTop">
  <div class="brand-line">
    <span class="brand-dollar">$</span>
    <span class="brand">rapid_captions</span>
    <button class="type-chip" id="typeChip" onclick="openTypesPanel()" title="change type">—</button>
    <button class="cog" id="previewBtn" onclick="openPreview()" title="preview caption">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <button class="cog" id="vaultBtn" onclick="openVault()" title="products">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4v10l-9 4-9-4V7z"/><path d="M3 7l9 4 9-4"/><path d="M12 11v10"/></svg>
    </button>
    <button class="cog" id="settingsBtn" onclick="toggleSettings()" title="settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

</header>

<main class="stage">

  <section class="type-hero" id="typeHero">
    <div class="zone-label">▸ pick caption type</div>
    <div class="type-grid">
      <button class="type-tile" data-type="standard" onclick="selectType('standard')">
        <span class="tt-icon">🛒</span><span class="tt-label">sell</span>
      </button>
      <button class="type-tile" data-type="flash" onclick="selectType('flash')">
        <span class="tt-icon">⚡</span><span class="tt-label">flash</span>
      </button>
      <button class="type-tile" data-type="new_arrival" onclick="selectType('new_arrival')">
        <span class="tt-icon">✨</span><span class="tt-label">new</span>
      </button>
      <button class="type-tile" data-type="last_pieces" onclick="selectType('last_pieces')">
        <span class="tt-icon">🔥</span><span class="tt-label">last</span>
      </button>
    </div>
    <button class="more-types" onclick="openTypesPanel()">▸ more types</button>
  </section>

  <section class="field-stack" id="fieldStack">

    <div class="field" id="fieldName" onclick="if(document.body.classList.contains('focus-price'))focusName()">
      <div class="field-head">
        <label class="field-lbl" for="productName">▸ name</label>
        <span class="field-chip" id="nameChip"></span>
      </div>
      <input type="text" id="productName"
             placeholder="e.g. iPhone 15"
             autocomplete="off"
             oninput="S.name=this.value;onNameInput()"
             onfocus="setFocusStep('name');renderSuggestions()"
             onblur="setFocusStep(null)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();focusPrice();}">
      <button class="desc-toggle" id="descToggle" onclick="toggleDescription()" type="button">+ description</button>
      <textarea class="desc-box" id="descBox" placeholder="short description…" rows="2" oninput="onDescInput()" spellcheck="false"></textarea>
      <div class="suggest-strip" id="suggestStrip"></div>
    </div>

    <div class="field" id="fieldPrice" onclick="if(document.body.classList.contains('focus-name'))focusPrice()">
      <div class="field-head">
        <label class="field-lbl" for="priceField">▸ price</label>
        <span class="field-chip" id="priceChip"></span>
      </div>
      <input type="text" id="priceField"
             placeholder="1200"
             inputmode="text"
             autocomplete="off"
             oninput="parsePriceInput(this.value)"
             onfocus="setFocusStep('price')"
             onblur="setFocusStep(null)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">
      <div class="extra-toggles">
        <button class="desc-toggle" id="retailToggle" onclick="toggleRetail()" type="button">+ retail</button>
      </div>
      <input type="text" id="retailField" class="retail-box"
             placeholder="retail: 1500 · 1500 5 · 1500,1800"
             inputmode="text"
             autocomplete="off"
             oninput="onRetailInput(this.value)"
             onfocus="setFocusStep('price')"
             onblur="setFocusStep(null)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">
      <div class="field-hint" id="priceHint">1200 · 1200 10 · 1200,1500 · 1200 10 low</div>
    </div>

    <div id="fieldsArea" class="extras"></div>

    <button type="button" class="variants-trigger" id="variantsTrigger" onclick="toggleVariantMode()">+ variants</button>
    <div class="variant-row" id="variantRow"></div>
    <div class="variant-panel" id="variantPanel"></div>

    <div class="chip-rail" id="chipRail">
      <button class="rail-chip" id="chipPlatform" onclick="openPicker('platform')">
        <span class="rc-k">net</span><span class="rc-v" id="chipPlatformV">whatsapp</span>
      </button>
      <button class="rail-chip" id="chipTone" onclick="openPicker('tone')">
        <span class="rc-k">tone</span><span class="rc-v" id="chipToneV">balanced</span>
      </button>
      <button class="rail-chip" id="chipLang" onclick="openPicker('lang')">
        <span class="rc-k">lang</span><span class="rc-v" id="chipLangV">en</span>
      </button>
    </div>

  </section>

</main>

<footer class="action-bar">
  <button class="copy-btn" id="copyBtn" onclick="doCopy()">copy caption</button>
  <button class="clear-btn" onclick="clearAll()" title="clear all">×</button>
</footer>

<aside class="side-panel" id="settingsPanel">
  <div class="panel-title">▸ business info</div>
  <div class="fld"><label class="fld-lbl">handle</label>
    <input type="text" id="cfgHandle" placeholder="@yourbrand" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">location</label>
    <input type="text" id="cfgLocation" placeholder="dar es salaam" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">phone</label>
    <input type="text" id="cfgPhone" placeholder="+255 …" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">currency</label>
    <input type="text" id="cfgCurrency" placeholder="USD" oninput="saveCfg()"></div>
  <div class="fld"><label class="fld-lbl">hashtags (IG only)</label>
    <input type="text" id="cfgHashtags" placeholder="#shopnow #deals" oninput="saveCfg()"></div>
  <button class="panel-done" onclick="toggleSettings()">▸ done</button>
</aside>

<aside class="side-panel" id="typesPanel">
  <div class="panel-title">▸ caption type</div>
  <div class="types-list" id="typesList"></div>
  <button class="panel-done" onclick="closeTypesPanel()">▸ done</button>
</aside>

<aside class="side-panel" id="pickerPanel">
  <div class="panel-title" id="pickerTitle">▸ pick</div>
  <div class="picker-list" id="pickerList"></div>
  <button class="panel-done" onclick="closePicker()">▸ done</button>
</aside>

<aside class="side-panel vault-panel" id="vaultPanel">
  <div class="panel-title">
    <span>▸ products <span class="vault-count" id="vaultCount"></span></span>
    <div class="vault-actions">
      <button class="vault-act" onclick="openImportPanel()">import</button>
      <button class="vault-act" id="vaultExportAllBtn" onclick="exportAll()">export</button>
      <button class="vault-act vault-wipe" id="vaultWipeBtn" onclick="vaultWipeRequest()">wipe</button>
    </div>
  </div>
  <input type="text" class="vault-search" id="vaultSearch" placeholder="search…" oninput="renderVault()" autocomplete="off">
  <div class="vault-list" id="vaultList"></div>
  <button class="panel-done" onclick="hidePanel('vaultPanel')">▸ done</button>
</aside>

<aside class="side-panel preview-panel" id="previewPanel">
  <div class="panel-title">
    <span>▸ preview</span>
    <div class="vault-actions">
      <span class="preview-meta" id="previewMeta"></span>
      <span class="char-counter" id="charCounter"></span>
      <button class="vault-act" id="resetPill" onclick="resetPreview()" title="reset">reset</button>
    </div>
  </div>
  <div class="preview-network-switch" id="previewNetSwitch"></div>
  <textarea id="previewBox" spellcheck="false" oninput="onPreviewEdit()" readonly>pick a type…</textarea>
  <div class="preview-actions">
    <button class="panel-done" onclick="hidePanel('previewPanel')">← back</button>
    <button class="import-commit" onclick="doCopy()">copy</button>
  </div>
</aside>

<aside class="side-panel" id="importPanel">
  <div class="panel-title">▸ import products</div>
  <div class="import-help">paste JSON — single object or array of products</div>
  <textarea id="importText" class="import-text" placeholder='[{"name":"iphone 15","description":"128gb","wholesale":{"price":"1200","qty":"10"}}]' oninput="renderImportPreview()" spellcheck="false"></textarea>
  <div class="import-preview" id="importPreview"></div>
  <div class="import-actions">
    <button class="panel-done" onclick="hidePanel('importPanel')">← back</button>
    <button class="import-commit" id="importCommitBtn" onclick="doImportCommit()">▸ import</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<div class="hidden-shim" aria-hidden="true">
  <div id="netPills"></div>
  <div id="typePills"></div>
  <div id="typeBlk"></div>
  <button id="modeSingle"></button>
  <button id="modeVariant"></button>
  <button id="toneHype"></button>
  <button id="toneBalanced"></button>
  <button id="tonePro"></button>
  <button id="langEn"></button>
  <button id="langSw"></button>
  <button id="miniCopyBtn"></button>
</div>

</body>
</html>
