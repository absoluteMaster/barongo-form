<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rapid Captions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b0b;
  --s1: #141414;
  --s2: #1c1c1c;
  --s3: #252525;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --a: #e8a020;
  --a2: #d44c20;
  --text: #ede9e0;
  --sub: #888880;
  --dim: #555550;
  --green: #3ecf6a;
  --orange: #f59e0b;
  --red: #ef5050;
  --r: 10px;
  --r2: 7px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

.hdr {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.hdr-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.hdr-logo {
  width: 30px; height: 30px; background: var(--a); border-radius: 7px;
  display: flex; align-items: center; justify-content: center; font-size: 15px;
  font-family: 'Syne', sans-serif; font-weight: 800; color: #000;
}
.hdr-name {
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text);
}
.hdr-name span { color: var(--a); }
.settings-btn {
  margin-left: auto;
  background: var(--s2); border: 1px solid var(--border); border-radius: var(--r2);
  color: var(--sub); font-size: 14px; width: 38px; height: 38px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.settings-btn:active { background: var(--s3); }
.settings-btn.has-config { border-color: var(--a); color: var(--a); }

.settings-panel {
  display: none; margin-bottom: 12px; background: var(--s1);
  border: 1px solid var(--border); border-radius: var(--r); padding: 14px;
  animation: fadeUp 0.2s ease;
}
.settings-panel.show { display: block; }

.controls-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.product-name-wrap { flex: 1; }
.product-name-wrap input {
  width: 100%; background: var(--s2); border: 1px solid var(--border2);
  border-radius: var(--r2); color: var(--text); font-family: 'Figtree', sans-serif;
  font-size: 15px; font-weight: 600; padding: 10px 14px; outline: none;
  transition: border-color 0.15s;
}
.product-name-wrap input:focus { border-color: var(--a); }
.product-name-wrap input::placeholder { color: var(--dim); font-weight: 400; }

.toggle-group {
  display: flex; background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--r2); overflow: hidden; flex-shrink: 0;
}
.tgl-btn {
  padding: 10px 11px; font-family: 'Syne', sans-serif; font-size: 10px;
  font-weight: 700; letter-spacing: 0.3px; background: none; border: none;
  color: var(--dim); cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.tgl-btn.on { background: var(--a); color: #000; }

.wrap { padding: 0 16px; max-width: 480px; margin: 0 auto; }

.blk { margin-top: 18px; animation: fadeUp 0.2s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.blk-label {
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px;
}

.pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  padding: 8px 14px; font-family: 'Syne', sans-serif; font-size: 12px;
  font-weight: 600; letter-spacing: 0.3px; background: var(--s2);
  border: 1px solid var(--border); border-radius: 30px; color: var(--sub);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.pill:active { transform: scale(0.96); }
.pill.on { background: var(--a); border-color: var(--a); color: #000; }

.fc {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 10px;
}
.fc-title {
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--a); margin-bottom: 12px;
}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.fld { margin-bottom: 10px; }
.fld:last-child { margin-bottom: 0; }
.fld-lbl {
  font-size: 11px; color: var(--dim); font-weight: 600;
  letter-spacing: 0.3px; margin-bottom: 5px; display: block;
}
input[type="text"], input[type="number"], textarea.field-ta {
  width: 100%; padding: 10px 12px; background: var(--s2); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--r2); font-size: 14px;
  font-family: 'Figtree', sans-serif; outline: none; transition: border-color 0.15s;
  -webkit-appearance: none;
}
textarea.field-ta { resize: vertical; min-height: 60px; }
input:focus, textarea.field-ta:focus { border-color: var(--a); }
input::placeholder, textarea.field-ta::placeholder { color: var(--dim); }

.og-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.og-toggle-btn {
  font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700;
  letter-spacing: 0.5px; color: var(--dim); background: none;
  border: 1px dashed var(--border2); border-radius: 20px; padding: 4px 10px;
  cursor: pointer; transition: all 0.15s;
}
.og-toggle-btn.on { color: var(--a2); border-color: var(--a2); border-style: solid; }
.og-field { display: none; }
.og-field.show { display: block; }

.status-row { display: flex; gap: 5px; margin-top: 10px; }
.st-btn {
  flex: 1; padding: 7px 4px; font-size: 11px; font-family: 'Syne', sans-serif;
  font-weight: 700; letter-spacing: 0.3px; border: 1px solid var(--border);
  border-radius: 6px; background: var(--s2); color: var(--dim); cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.st-btn.g { background: rgba(62,207,106,0.12); border-color: var(--green); color: var(--green); }
.st-btn.o { background: rgba(245,158,11,0.12); border-color: var(--orange); color: var(--orange); }
.st-btn.r { background: rgba(239,80,80,0.12); border-color: var(--red); color: var(--red); }

.restock-reveal {
  display: none; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border); animation: fadeUp 0.2s ease;
}
.restock-reveal.show { display: block; }

.variant-card {
  background: var(--s2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 13px; margin-bottom: 8px; position: relative; animation: fadeUp 0.2s ease;
}
.v-label {
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; color: var(--a); margin-bottom: 10px; padding-right: 32px;
}
.v-del {
  position: absolute; top: 10px; right: 10px;
  background: rgba(239,80,80,0.1); border: none; color: var(--red);
  width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.unit-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.uc {
  padding: 4px 9px; font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700;
  background: var(--s1); border: 1px solid var(--border); border-radius: 20px;
  color: var(--dim); cursor: pointer; transition: all 0.15s;
}
.uc.on { background: rgba(232,160,32,0.15); border-color: var(--a); color: var(--a); }
.add-variant-btn {
  width: 100%; padding: 11px; background: transparent;
  border: 1px dashed var(--border2); border-radius: var(--r); color: var(--sub);
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s; margin-top: 4px;
}
.add-variant-btn:active { background: rgba(255,255,255,0.03); }

.div { height: 1px; background: var(--border); margin: 10px 0; }

.preview-wrap {
  margin-top: 18px; border-radius: var(--r); overflow: hidden;
  border: 1px solid var(--border2);
}
.preview-head {
  background: var(--s2); padding: 9px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.preview-head-left {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--dim);
}
.preview-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--a); }
.preview-right { display: flex; align-items: center; gap: 10px; }
.char-counter {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim);
  display: none;
}
.char-counter.show { display: block; }
.char-counter.warn { color: var(--orange); }
.char-counter.over { color: var(--red); font-weight: 700; }
.reset-pill {
  font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700;
  letter-spacing: 0.5px; color: var(--a2); background: rgba(212,76,32,0.1);
  border: 1px solid var(--a2); border-radius: 20px; padding: 3px 10px;
  cursor: pointer; display: none;
}
.reset-pill.show { display: block; }
#previewBox {
  width: 100%; min-height: 140px; padding: 14px; background: var(--s1);
  color: #c8c5bc; font-family: 'DM Mono', monospace; font-size: 12px;
  line-height: 1.85; border: none; outline: none; resize: vertical;
  white-space: pre-wrap;
}

.copy-btn {
  width: 100%; margin-top: 10px; padding: 16px; background: var(--a); color: #000;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800;
  letter-spacing: 1px; text-transform: uppercase; border: none;
  border-radius: var(--r); cursor: pointer; transition: all 0.15s;
}
.copy-btn:active { transform: scale(0.98); }
.copy-btn.done { background: var(--green); }

.gone { display: none !important; }

/* star rating */
.stars { display: flex; gap: 4px; margin-bottom: 8px; }
.star-btn {
  font-size: 20px; background: none; border: none; cursor: pointer;
  color: var(--dim); transition: color 0.1s;
}
.star-btn.on { color: var(--a); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">R</div>
    <div class="hdr-name">RAPID <span>CAPTIONS</span></div>
    <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()" title="Settings">&#9881;</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="fc-title">Your Business Info</div>
    <div class="fld">
      <label class="fld-lbl">Brand / Handle</label>
      <input type="text" id="cfgHandle" placeholder="e.g. @yourbrand" oninput="saveCfg()">
    </div>
    <div class="fld">
      <label class="fld-lbl">Location</label>
      <input type="text" id="cfgLocation" placeholder="e.g. New York, NY" oninput="saveCfg()">
    </div>
    <div class="fld">
      <label class="fld-lbl">Phone / Contact</label>
      <input type="text" id="cfgPhone" placeholder="e.g. +1 555 123 4567" oninput="saveCfg()">
    </div>
    <div class="fld">
      <label class="fld-lbl">Currency</label>
      <input type="text" id="cfgCurrency" placeholder="e.g. USD, TZS, KES" value="USD" oninput="saveCfg()">
    </div>
  </div>

  <div class="controls-row">
    <div class="product-name-wrap">
      <input type="text" id="productName" placeholder="Product name..." oninput="S.name=this.value;regen()">
    </div>
    <div class="toggle-group" id="modeToggle">
      <button class="tgl-btn on" id="modeSingle" onclick="setMode('single')">Single</button>
      <button class="tgl-btn" id="modeVariant" onclick="setMode('variant')">Variants</button>
    </div>
  </div>
  <div class="controls-row">
    <div class="toggle-group" id="toneToggle" style="width:100%;">
      <button class="tgl-btn" id="toneHype" onclick="setTone('hype')" style="flex:1;">&#128293; Hype</button>
      <button class="tgl-btn on" id="toneBalanced" onclick="setTone('balanced')" style="flex:1;">&#9878;&#65039; Balanced</button>
      <button class="tgl-btn" id="tonePro" onclick="setTone('pro')" style="flex:1;">&#127913; Pro</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="blk" id="netBlk">
    <div class="blk-label">Platform</div>
    <div class="pills" id="netPills"></div>
  </div>

  <div class="blk gone" id="typeBlk">
    <div class="blk-label">Caption Type</div>
    <div class="pills" id="typePills"></div>
  </div>

  <div id="fieldsArea"></div>

  <div class="preview-wrap" id="previewWrap">
    <div class="preview-head">
      <div class="preview-head-left">
        <div class="preview-dot"></div>
        Preview
      </div>
      <div class="preview-right">
        <span class="char-counter" id="charCounter"></span>
        <button class="reset-pill" id="resetPill" onclick="resetPreview()">Reset</button>
      </div>
    </div>
    <textarea id="previewBox" spellcheck="false" oninput="onPreviewEdit()">Pick a platform and caption type...</textarea>
  </div>

  <button class="copy-btn" id="copyBtn" onclick="doCopy()">Copy Caption</button>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const S = {
  network: null, type: null, mode: 'single', tone: 'balanced', name: '',
  w: { price:'', qty:'', og:'', ogOn:false, status:'in_stock' },
  r: { price:'', qty:'', og:'', ogOn:false, status:'in_stock' },
  flash: { price:'', og:'' },
  restockDate: '', restockHeadline: '',
  variants: [], variantRestock: '',
  // new type fields
  bundle: { item2:'', comboPrice:'', savings:'' },
  drop: {},  // uses w/r with ogOn forced
  lastQty: '',
  review: { quote:'', reviewer:'', stars:0 },
  previewEdited: false,
};

// ═══════════════════════════════════════
// CONFIG (localStorage)
// ═══════════════════════════════════════
const CFG = (() => {
  try { const r = localStorage.getItem('rc_cfg'); if(r) return JSON.parse(r); } catch(e){}
  return { handle:'', location:'', phone:'', currency:'USD', tone:'balanced' };
})();

function saveCfg() {
  CFG.handle = document.getElementById('cfgHandle').value;
  CFG.location = document.getElementById('cfgLocation').value;
  CFG.phone = document.getElementById('cfgPhone').value;
  CFG.currency = document.getElementById('cfgCurrency').value || 'USD';
  CFG.tone = S.tone;
  localStorage.setItem('rc_cfg', JSON.stringify(CFG));
  updateSettingsBtn();
  regen();
}
function initCfgFields() {
  document.getElementById('cfgHandle').value = CFG.handle||'';
  document.getElementById('cfgLocation').value = CFG.location||'';
  document.getElementById('cfgPhone').value = CFG.phone||'';
  document.getElementById('cfgCurrency').value = CFG.currency||'USD';
  if (CFG.tone) { S.tone = CFG.tone; setTone(S.tone); }
  updateSettingsBtn();
}
function updateSettingsBtn() {
  const btn = document.getElementById('settingsBtn');
  btn.classList.toggle('has-config', !!(CFG.handle||CFG.location||CFG.phone));
}
function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('show'); }
function CC() { return CFG.currency||'USD'; }

// ═══════════════════════════════════════
// EMOJI REGISTRY
// ═══════════════════════════════════════
const EM = {
  header_product:    { hype:'🛒🔥', balanced:'🛒', pro:'' },
  header_flash:      { hype:'⚡🔥', balanced:'⚡', pro:'' },
  header_new:        { hype:'✨🆕', balanced:'✨', pro:'' },
  header_restock:    { hype:'🔄✅', balanced:'🔄', pro:'' },
  header_repost:     { hype:'📢🔥', balanced:'📢', pro:'' },
  header_bundle:     { hype:'🎁🔥', balanced:'🎁', pro:'' },
  header_drop:       { hype:'📉🔥', balanced:'📉', pro:'' },
  header_last:       { hype:'🚨🔥', balanced:'🚨', pro:'' },
  header_review:     { hype:'⭐🔥', balanced:'⭐', pro:'' },
  section_wholesale: { hype:'📦💰', balanced:'📦', pro:'' },
  section_retail:    { hype:'🛍️💰', balanced:'🛍️', pro:'' },
  price_arrow:       { hype:'👉🔥', balanced:'👉', pro:'•' },
  status_in:         { hype:'✅🟢', balanced:'✅', pro:'' },
  status_low:        { hype:'⚠️🔥', balanced:'⚠️', pro:'' },
  status_out:        { hype:'❌😱', balanced:'❌', pro:'' },
  cta_order:         { hype:'🏃💨', balanced:'👇', pro:'' },
  cta_dm:            { hype:'💬🔥', balanced:'💬', pro:'' },
  sig_handle:        { hype:'🌐', balanced:'🌐', pro:'' },
  sig_location:      { hype:'📍', balanced:'📍', pro:'' },
  sig_phone:         { hype:'📞', balanced:'📞', pro:'' },
  fire:              { hype:'🔥', balanced:'', pro:'' },
  star:              { hype:'⭐', balanced:'⭐', pro:'' },
  divider:           { hype:'🔥🔥🔥🔥🔥🔥🔥🔥🔥', balanced:'───────────────', pro:'───────────────' },
};

function E(role) {
  const t = S.tone;
  // platform can downgrade tone
  let effective = t;
  if (S.network === 'tiktok' || S.network === 'twitter') effective = 'pro'; // minimal emojis
  else if (S.network === 'instagram' && t === 'hype') effective = 'balanced'; // cap IG at balanced
  else if (S.network === 'facebook' && t === 'hype') effective = 'balanced';
  else if (S.network === 'any') effective = 'pro'; // plain = no emojis
  const entry = EM[role];
  if (!entry) return '';
  return entry[effective] || '';
}

function Ep(role) {
  // "pure" emoji lookup ignoring platform caps — for signature
  const entry = EM[role];
  if (!entry) return '';
  return entry[S.tone] || '';
}

// ═══════════════════════════════════════
// PLATFORM CONFIG
// ═══════════════════════════════════════
const PLATFORMS = {
  whatsapp:  { label:'💬 WhatsApp',  md:true,  maxLen:0,    short:false },
  telegram:  { label:'✈️ Telegram',  md:true,  maxLen:0,    short:false },
  instagram: { label:'📸 Instagram', md:false, maxLen:2200, short:false },
  tiktok:    { label:'🎵 TikTok',    md:false, maxLen:150,  short:true  },
  facebook:  { label:'👥 Facebook',  md:false, maxLen:500,  short:false },
  twitter:   { label:'𝕏 Twitter',    md:false, maxLen:280,  short:true  },
  any:       { label:'📄 Plain',     md:false, maxLen:0,    short:false },
};

function useMd() { return PLATFORMS[S.network]?.md; }
function isShort() { return PLATFORMS[S.network]?.short; }
function maxLen() { return PLATFORMS[S.network]?.maxLen || 0; }

function B(text) { return useMd() ? `*${text}*` : text; }
function STR(text) { return useMd() ? `~${text}~` : text; }

// ═══════════════════════════════════════
// NETWORKS & TYPES
// ═══════════════════════════════════════
const NETWORKS = Object.keys(PLATFORMS);

const REGISTRY = [
  { id:'standard',       label:'Standard',       nets:['whatsapp','telegram','instagram','facebook','twitter','any'], groups:['wholesale','retail'], build:buildStandard },
  { id:'wholesale_only', label:'Wholesale Only',  nets:['whatsapp','telegram','facebook','any'], groups:['wholesale'], build:buildWholesaleOnly },
  { id:'repost',         label:'Repost',          nets:['whatsapp','telegram','instagram','facebook','any'], groups:['wholesale','retail'], build:buildRepost },
  { id:'flash',          label:'Flash Sale',      nets:['whatsapp','telegram','instagram','facebook','twitter','any'], groups:['flash','wholesale'], build:buildFlash },
  { id:'new_arrival',    label:'New Arrival',     nets:['whatsapp','telegram','tiktok','instagram','facebook','twitter','any'], groups:['wholesale','retail'], build:buildNewArrival },
  { id:'back_in_stock',  label:'Back in Stock',   nets:['whatsapp','telegram','instagram','facebook','any'], groups:['restock_headline','wholesale','retail'], build:buildBackInStock },
  { id:'engagement',     label:'Engagement',      nets:['tiktok','instagram','facebook','twitter','any'], groups:[], build:buildEngagement },
  { id:'plain',          label:'Plain Text',      nets:['any'], groups:['wholesale','retail'], build:buildPlain },
  { id:'bundle',         label:'Bundle Deal',     nets:['whatsapp','telegram','instagram','facebook','twitter','any'], groups:['bundle','wholesale','retail'], build:buildBundle },
  { id:'price_drop',     label:'Price Drop',      nets:['whatsapp','telegram','instagram','facebook','twitter','any'], groups:['wholesale','retail'], build:buildPriceDrop },
  { id:'last_pieces',    label:'Last Pieces',     nets:['whatsapp','telegram','instagram','facebook','twitter','any'], groups:['last_qty','wholesale','retail'], build:buildLastPieces },
  { id:'review',         label:'Review',          nets:['whatsapp','telegram','instagram','facebook','any'], groups:['testimonial','wholesale','retail'], build:buildReview },
];

const UNITS = ['pc','kg','g','L','ml','cm','inch','--'];

// ═══════════════════════════════════════
// TONE
// ═══════════════════════════════════════
function setTone(t) {
  S.tone = t;
  ['Hype','Balanced','Pro'].forEach(n => {
    document.getElementById('tone'+n).classList.toggle('on', n.toLowerCase() === t || (n==='Pro' && t==='pro'));
  });
  CFG.tone = t;
  try { localStorage.setItem('rc_cfg', JSON.stringify(CFG)); } catch(e){}
  regen();
}

// ═══════════════════════════════════════
// NETWORK & TYPE SELECTION
// ═══════════════════════════════════════
function initNetworks() {
  document.getElementById('netPills').innerHTML = NETWORKS.map(id =>
    `<button class="pill" onclick="selectNetwork('${id}')" id="net_${id}">${PLATFORMS[id].label}</button>`
  ).join('');
}

function selectNetwork(id) {
  S.network = id;
  document.querySelectorAll('#netPills .pill').forEach(b => b.classList.remove('on'));
  document.getElementById('net_'+id).classList.add('on');
  if (S.type) {
    const def = REGISTRY.find(r => r.id === S.type);
    if (!def || !def.nets.includes(id)) S.type = null;
  }
  renderTypePills();
  document.getElementById('typeBlk').classList.remove('gone');
  updateCharCounter();
}

function renderTypePills() {
  const el = document.getElementById('typePills');
  const avail = REGISTRY.filter(r => r.nets.includes(S.network));
  el.innerHTML = avail.map(r =>
    `<button class="pill ${S.type===r.id?'on':''}" onclick="selectType('${r.id}')" id="type_${r.id}">${r.label}</button>`

function selectType(id) {
  S.type = id;
  document.querySelectorAll('#typePills .pill').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('type_'+id);
  if (btn) btn.classList.add('on');

function setMode(m) {

function renderFields() {
  const area = document.getElementById('fieldsArea');
  if (!S.type) { area.innerHTML=''; return; }
  const def = REGISTRY.find(r=>r.id===S.type);
  if (!def) { area.innerHTML=''; return; }
  let html = '<div class="blk" id="fieldsInner">';
  if (S.mode==='variant') {
    const needsPrices = def.groups.some(g=>['wholesale','retail','flash'].includes(g));
    if (def.groups.includes('restock_headline')) html += htmlRestockHeadline();
    if (def.groups.includes('testimonial')) html += htmlTestimonial();
    if (def.groups.includes('bundle')) html += htmlBundleFields();
    if (def.groups.includes('last_qty')) html += htmlLastQty();
    if (def.groups.includes('flash')) html += htmlFlashGroupVariant();
    if (needsPrices) html += htmlVariantSection(def);
  } else {
    if (def.groups.includes('restock_headline')) html += htmlRestockHeadline();
    if (def.groups.includes('testimonial')) html += htmlTestimonial();
    if (def.groups.includes('bundle')) html += htmlBundleFields();
    if (def.groups.includes('last_qty')) html += htmlLastQty();
    if (def.groups.includes('flash')) html += htmlFlashGroup();
    if (def.groups.includes('wholesale')) html += htmlWholesaleGroup();
    if (def.groups.includes('retail')) html += htmlRetailGroup();
  }
  html += '</div>';
  area.innerHTML = html;
  if (S.mode==='single') {
    applyStatus('w',S.w.status);
    applyStatus('r',S.r.status);
    if(S.w.ogOn){const f=document.getElementById('wOgField');if(f)f.classList.add('show');}
    if(S.r.ogOn){const f=document.getElementById('rOgField');if(f)f.classList.add('show');}
    checkRestockVisibility();
  } else {
    renderVariantRows();
  }
  // restore star rating
  if (def.groups.includes('testimonial')) applyStars(S.review.stars);
}

    prefix:v.prefix||'', size:v.size||'', unit:v.unit||'pc', customUnit:v.customUnit||'',
    wholesale:v.wholesale||'', wholesaleQty:v.wholesaleQty||'', wOg:v.wOg||'',
    retail:v.retail||'', rOg:v.rOg||'',
    flashPrice:v.flashPrice||'', flashOg:v.flashOg||'',
    status:v.status||'in_stock',
  });
  renderVariantRows(); regen();
}
function removeVariant(i) { S.variants.splice(i,1); renderVariantRows(); regen(); }

function updateVLabel(i) {
  const el=document.getElementById('vlabel_'+i); if(!el)return;
  el.textContent=`VARIANT ${i+1}${buildVName(S.variants[i])?' — '+buildVName(S.variants[i]):''}`;
}
function setVUnit(i,u) {
  S.variants[i].unit=u;
  const ci=document.getElementById('vcu_'+i); if(ci) ci.style.display=u==='--'?'block':'none';
  const card=document.getElementById('variantRows').children[i];
  if(card) card.querySelectorAll('.uc').forEach((btn,j)=>btn.classList.toggle('on',UNITS[j]===u));
  regen();
}
function setVStatus(i,st) {
  S.variants[i].status=st;
  const card=document.getElementById('variantRows').children[i];
  if(card){const b=card.querySelectorAll('.status-row .st-btn');
    b[0].className='st-btn'+(st==='in_stock'?' g':'');
    b[1].className='st-btn'+(st==='low_stock'?' o':'');
    b[2].className='st-btn'+(st==='out_of_stock'?' r':'');}
  checkVariantRestock(); regen();
}
function checkVariantRestock() {
  const el=document.getElementById('variantRestockReveal'); if(!el)return;
  el.classList.toggle('show', S.variants.length>0 && S.variants.every(v=>v.status==='out_of_stock'));
}
function buildVName(v) {
  const unit=v.unit==='--'?v.customUnit:v.unit;
  if(!v.size) return v.prefix||'';
  if(v.prefix) return (unit&&unit!=='pc')?`${v.prefix}-${v.size} ${unit}`:`${v.prefix}-${v.size}`;
  return (unit&&unit!=='pc')?`${v.size} ${unit}`:v.size;
}

function setStatus(w,val) {
  if(w==='w')S.w.status=val; else S.r.status=val;
  applyStatus(w,val); checkRestockVisibility(); regen();
}
function applyStatus(w,val) {
  ['in','low','out'].forEach(s=>{

    btn.className='st-btn';

    if(s==='out'&&val==='out_of_stock')btn.classList.add('r');
  });
}
function checkRestockVisibility() {
  const def=REGISTRY.find(r=>r.id===S.type);
  if(!def||def.groups.includes('restock_headline'))return;
  const wr=document.getElementById('wRestock');
  const rr=document.getElementById('rRestock');
  if(wr)wr.classList.toggle('show',S.w.status==='out_of_stock');

function toggleOg(w) {
  if(w==='w')S.w.ogOn=!S.w.ogOn; else S.r.ogOn=!S.r.ogOn;
  const f=document.getElementById(w+'OgField');
  const btn=document.getElementById(w+'OgBtn');
  const on=w==='w'?S.w.ogOn:S.r.ogOn;
  if(f)f.classList.toggle('show',on);
  if(btn)btn.classList.toggle('on',on);
  if(!on){if(w==='w')S.w.og='';else S.r.og='';}
  regen();
}

// HELPERS
// ═══════════════════════════════════════
function fmt(n) { if(!n)return n; return Number(String(n).replace(/,/g,'')).toLocaleString('en-US'); }

// ═══════════════════════════════════════
// SIGNATURE (platform-aware)
// ═══════════════════════════════════════
function getSig() {
  const h=CFG.handle, l=CFG.location, p=CFG.phone;
  if(!h&&!l&&!p) return '';
  const net = S.network;
  // TikTok / Twitter: just handle
  if(net==='tiktok'||net==='twitter') return h ? `\n${h}` : '';
  // Instagram: single line before hashtags
  if(net==='instagram') {
    return '\n'+[h,l,p].filter(Boolean).join(' | ');
  }
  // WhatsApp / Telegram: emoji-prefixed block
  if(net==='whatsapp'||net==='telegram') {
    const div = E('divider')||'───────────────';
    let lines = [`\n${div}`];
    if(h) lines.push(`${Ep('sig_handle')} ${h}`.trim());
    if(l) lines.push(`${Ep('sig_location')} ${l}`.trim());
    if(p) lines.push(`${Ep('sig_phone')} ${p}`.trim());
    return lines.join('\n');
  }
  // Facebook / Plain: simple line
  return '\n'+[h,l,p].filter(Boolean).join(' | ');
}

// ═══════════════════════════════════════
// CAPTION BUILDING BLOCKS
// ═══════════════════════════════════════
function getWBlock() {
  const price=S.mode==='single'?S.w.price:null;
  const qty=S.mode==='single'?(S.w.qty||'1'):null;
  const og=S.mode==='single'&&S.w.ogOn?S.w.og:'';
  const status=S.mode==='single'?S.w.status:null;
  if(!price||!qty||status==='out_of_stock') return '';
  const sw=E('section_wholesale'), pa=E('price_arrow');
  let line = og
    ? `${sw} ${B('Wholesale')}\n${STR(`${pa} ${qty}pc = ${CC()} ${fmt(og)}`)}\n${pa} ${qty}pc = ${B(`${CC()} ${fmt(price)}`)}`
    : `${sw} ${B('Wholesale')}\n${pa} ${qty}pc = ${B(`${CC()} ${fmt(price)}`)}`;
  if(status==='low_stock') line+=` ${E('status_low')}`;
  return line.replace(/^ /,'');
}

function getRBlock() {
  const price=S.mode==='single'?S.r.price:null;
  const qty=S.mode==='single'?(S.r.qty||'1'):null;
  const og=S.mode==='single'&&S.r.ogOn?S.r.og:'';
  const status=S.mode==='single'?S.r.status:null;
  if(!price||status==='out_of_stock') return '';
  const sr=E('section_retail'), pa=E('price_arrow');
  let line = og
    ? `${sr} ${B('Retail')}\n${STR(`${pa} ${qty}pc = ${CC()} ${fmt(og)}`)}\n${pa} ${qty}pc = ${B(`${CC()} ${fmt(price)}`)}`
    : `${sr} ${B('Retail')}\n${pa} ${qty}pc = ${B(`${CC()} ${fmt(price)}`)}`;
  if(status==='low_stock') line+=` ${E('status_low')}`;
  return line.replace(/^ /,'');
}

function getVariantLines(isFlash=false, isWholesaleOnly=false) {
  const active=S.variants.filter(v=>v.status!=='out_of_stock');
  if(!active.length) return null;
  const pa=E('price_arrow');
  return active.map(v=>{
    const vName=buildVName(v);
    let block=`${E('fire')} ${B(vName)}\n`.replace(/^ /,'');
    if(isFlash){
      if(v.flashOg) block+=`${STR(`Was: ${CC()} ${fmt(v.flashOg)}`)}\n`;
      if(v.flashPrice) block+=`${E('header_flash')} Flash: ${B(`${CC()} ${fmt(v.flashPrice)}`)}`.replace(/^ /,'');
    } else {
      if(v.wholesale&&v.wholesaleQty){
        if(v.wOg){ block+=`${E('section_wholesale')} ${STR(`Wholesale: ${v.wholesaleQty}pc = ${CC()} ${fmt(v.wOg)}`)}\n`.replace(/^ /,'');
          block+=`${E('section_wholesale')} Wholesale: ${v.wholesaleQty}pc = ${B(`${CC()} ${fmt(v.wholesale)}`)}`.replace(/^ /,'');
        } else { block+=`${E('section_wholesale')} Wholesale: ${v.wholesaleQty}pc = ${B(`${CC()} ${fmt(v.wholesale)}`)}`.replace(/^ /,''); }
      }
      if(!isWholesaleOnly&&v.retail){
        if(v.wholesale&&v.wholesaleQty) block+='\n';
        if(v.rOg){ block+=`${E('section_retail')} ${STR(`Retail: 1pc = ${CC()} ${fmt(v.rOg)}`)}\n`.replace(/^ /,'');
          block+=`${E('section_retail')} Retail: 1pc = ${B(`${CC()} ${fmt(v.retail)}`)}`.replace(/^ /,'');
        } else { block+=`${E('section_retail')} Retail: 1pc = ${B(`${CC()} ${fmt(v.retail)}`)}`.replace(/^ /,''); }
      }
    }
    if(v.status==='low_stock') block+=` ${E('status_low')}`;
    return block;
  }).join('\n\n');
}

function getOutOfStockBlock() {
  const date=S.mode==='variant'?S.variantRestock:S.restockDate;
  if(date) return `${E('status_out')} Restocking — ${B(date)}`.replace(/^ /,'');
  return `${E('status_out')} ${B('Out of Stock')}`.replace(/^ /,'');
}

function isAllOut() {
  if(S.mode==='variant') return S.variants.length>0&&S.variants.every(v=>v.status==='out_of_stock');
  return S.w.status==='out_of_stock'&&S.r.status==='out_of_stock';
}

function hypeText(normal, hypeVer) { return S.tone==='hype'?hypeVer:normal; }

function assembleSingle(header, body, footer='') {
  const div = E('divider')||'───────────────';
  const sig = getSig();
  let out = `${header}\n${div}\n\n${body}`;
  if(footer) out+=`\n\n${footer}`;
  if(sig) out+=`\n${sig}`;
  return out;
}

// ═══════════════════════════════════════
// SHORT PLATFORM BUILDERS (TikTok, X)
// ═══════════════════════════════════════
function buildShort(hook, cta) {
  const name=S.name||'this';
  const sig=getSig();
  return `${hook}\n${cta}${sig}`;
}

// ═══════════════════════════════════════
// CAPTION BUILDERS
// ═══════════════════════════════════════

function buildStandard() {
  const name=S.name||'—';
  if(isShort()) return buildShort(
    `${E('header_product')} ${name}`.trim(),
    hypeText('DM for prices','DM NOW for prices! '+E('fire'))
  );
  const h=`${E('header_product')} ${B(name)}`.trim();
  if(S.mode==='variant'){
    return assembleSingle(h, getVariantLines()||getOutOfStockBlock());
  }
  const body=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n')||getOutOfStockBlock();
  return assembleSingle(h, body);
}

function buildWholesaleOnly() {
  const name=S.name||'—';
  if(isShort()) return buildShort(
    `${E('section_wholesale')} ${name} — Wholesale`.trim(),
    hypeText('DM for bulk pricing','BULK DEALS — DM now! '+E('fire'))
  );
  const h=`${E('header_product')} ${B(name)}`.trim();
  if(S.mode==='variant') return assembleSingle(h, getVariantLines(false,true)||getOutOfStockBlock());
  return assembleSingle(h, getWBlock()||getOutOfStockBlock());
}

function buildRepost() {
  const name=S.name||'—';
  const cta=hypeText(
    `${E('cta_order')} ${hypeText('Order now','SELLING FAST — grab yours NOW!')}`.trim(),
    `${E('cta_order')} SELLING FAST — grab yours NOW! ${E('fire')}`.trim()
  );
  if(isShort()) return buildShort(
    `${E('header_repost')} ${name} — still available!`.trim(), cta
  );
  const h=`${E('header_repost')} ${B(`${name} — ${hypeText('still available!','STILL AVAILABLE!')}`)}`.trim();
  if(S.mode==='variant') return assembleSingle(h, getVariantLines()||getOutOfStockBlock(), cta);
  const body=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n')||getOutOfStockBlock();
  return assembleSingle(h, body, cta);
}

function buildFlash() {
  const name=S.name||'—';
  const flashHead=`${E('header_flash')} ${B(hypeText('FLASH SALE — TODAY ONLY','FLASH SALE — TODAY ONLY!'))} ${E('header_flash')}`.trim();
  if(isShort()){
    const fp=S.flash.price?` ${CC()} ${fmt(S.flash.price)}`:'';
    return buildShort(flashHead, `${name}${fp}\n${hypeText('Limited time','GRAB IT NOW! '+E('fire'))}`);
  }
  const div=E('divider')||'───────────────';
  const sig=getSig();
  if(S.mode==='variant'){
    const lines=getVariantLines(true);
    const body=lines?`${E('header_product')} ${B(name)}\n\n${lines}`.trim():getOutOfStockBlock();
    let out=`${flashHead}\n${div}\n\n${body}\n\n${hypeText('Limited time offer','⏰ LIMITED TIME — ACT NOW!')}`;
    if(sig) out+=`\n${sig}`;
    return out;
  }
  let body=`${E('header_product')} ${B(name)}\n`.trim();
  if(S.flash.og) body+=`\n${STR(`Was: ${CC()} ${fmt(S.flash.og)}`)}`;
  if(S.flash.price) body+=`\n${E('header_flash')} ${hypeText('Now:','NOW ONLY:')} ${B(`${CC()} ${fmt(S.flash.price)}`)}`.trim();
  const wBlock=getWBlock();
  if(wBlock) body+=`\n\n${wBlock}`;
  body+=`\n\n${hypeText('Limited time offer','⏰ LIMITED TIME — ACT NOW!')}`;
  let out=`${flashHead}\n${div}\n\n${body}`;
  if(sig) out+=`\n${sig}`;
  return out;
}

function buildNewArrival() {
  const name=S.name||'—';
  if(isShort()) return buildShort(
    `${E('header_new')} ${name} — ${hypeText('JUST ARRIVED!','JUST DROPPED!')}`.trim(),
    hypeText('DM for price','Want it? DM NOW! '+E('fire'))
  );
  const h=`${E('header_new')} ${B(`${name} — ${hypeText('Just Arrived!','JUST ARRIVED!')}`)}`.trim();
  const intro=`${hypeText('New in store!','🆕 BRAND NEW IN STORE!')}`;
  if(S.mode==='variant') return assembleSingle(h, `${intro}\n\n${getVariantLines()||getOutOfStockBlock()}`);
  const priceBody=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n');
  return assembleSingle(h, priceBody?`${intro}\n\n${priceBody}`:intro);
}

function buildBackInStock() {
  const name=S.name||'—';
  const headline=S.restockHeadline||hypeText('Back in Stock!','BACK IN STOCK!');
  if(isShort()) return buildShort(
    `${E('header_restock')} ${name} — ${headline}`.trim(),
    hypeText('Available again','IT\'S BACK! Get yours '+E('fire'))
  );
  const h=`${E('header_restock')} ${B(`${name} — ${headline}`)}`.trim();
  const intro=`${E('status_in')} ${hypeText('Available again!','AVAILABLE AGAIN!')}`.trim();
  if(S.mode==='variant') return assembleSingle(h, `${intro}\n\n${getVariantLines()||'Coming soon...'}`);
  const priceBody=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n');
  return assembleSingle(h, priceBody?`${intro}\n\n${priceBody}`:intro);
}

function buildEngagement() {
  const name=S.name||'this';
  if(isShort()) return buildShort(
    `${hypeText('Want '+name+'?','Want '+name+'? 👀')}`,
    hypeText('DM your budget','Tell us your budget — we\'ll make it work! '+E('fire'))
  );
  const h=hypeText(`Want ${name}?`,`Want ${name}? 👀🔥`);
  const body=hypeText(
    'Tell us your budget — we\'ll make it work!\n\nWholesale and retail welcome.',
    'Tell us your budget — we\'ll give you the BEST deal! 💰🔥\n\nWholesale and retail ALL welcome!'
  );
  const cta=CFG.phone?`\n${E('sig_phone')} ${CFG.phone}`.trim():'';
  const sig=getSig();
  return `${h}\n${E('divider')||'───────────────'}\n\n${body}${cta}${sig?'\n'+sig:''}`;
}

function buildPlain() {
  const name=S.name||'—';
  // Plain always uses pro tone (no emojis, no markdown)
  const origTone=S.tone; S.tone='pro';
  let body;
  if(S.mode==='variant'){
    body=getVariantLines()||getOutOfStockBlock();
  } else {
    body=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n')||getOutOfStockBlock();
  }
  S.tone=origTone;
  const parts=[CFG.handle,CFG.location,CFG.phone].filter(Boolean);
  const sig=parts.length?'\n\n'+parts.join(' | '):'';
  return `${name}\n---------------\n\n${body}${sig}`;
}

function buildBundle() {
  const name=S.name||'—';
  const item2=S.bundle.item2||'Item 2';
  const combo=S.bundle.comboPrice;
  const savings=S.bundle.savings;
  if(isShort()){
    let short=`${E('header_bundle')} ${name} + ${item2}`.trim();
    if(combo) short+=` = ${CC()} ${fmt(combo)}`;
    if(savings) short+=` (save ${CC()} ${fmt(savings)}${E('fire')})`.trim();
    return buildShort(short, hypeText('DM to order','GET THIS DEAL NOW! '+E('fire')));
  }
  const h=`${E('header_bundle')} ${B(`${name} + ${item2}`)}`.trim();
  let bundleBody=`${hypeText('Bundle Deal','🎁 BUNDLE DEAL')}`;
  if(combo) bundleBody+=`\n${E('price_arrow')} Combo: ${B(`${CC()} ${fmt(combo)}`)}`.replace(/^ /,'');
  if(savings) bundleBody+=`\n${hypeText(`Save ${CC()} ${fmt(savings)}`,`💰 YOU SAVE ${CC()} ${fmt(savings)}!`)}`;
  if(S.mode==='variant') {
    const lines=getVariantLines();
    if(lines) bundleBody+=`\n\n${lines}`;
  } else {
    const priceBody=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n');
    if(priceBody) bundleBody+=`\n\n${priceBody}`;
  }
  return assembleSingle(h, bundleBody);
}

function buildPriceDrop() {
  const name=S.name||'—';
  if(isShort()){
    return buildShort(
      `${E('header_drop')} ${name} — PRICE DROP`.trim(),
      hypeText('Check new prices','NEW LOW PRICES — DM now! '+E('fire'))
    );
  }
  const h=`${E('header_drop')} ${B(`${name} — ${hypeText('Price Drop!','PRICE DROP!')}`)}`.trim();
  // Force show old prices
  const origWOg=S.w.ogOn, origROg=S.r.ogOn;
  S.w.ogOn=!!S.w.og; S.r.ogOn=!!S.r.og;
  let body;
  if(S.mode==='variant') {
    body=getVariantLines()||getOutOfStockBlock();
  } else {
    body=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n')||getOutOfStockBlock();
  }
  S.w.ogOn=origWOg; S.r.ogOn=origROg;
  const cta=hypeText('New prices now live!',`${E('fire')} NEW LOW PRICES — don't miss out!`);
  return assembleSingle(h, body, cta);
}

function buildLastPieces() {
  const name=S.name||'—';
  const qty=S.lastQty;
  const qtyText=qty?`Only ${qty} left!`:'Last pieces!';
  if(isShort()) return buildShort(
    `${E('header_last')} ${name} — ${qtyText}`.trim(),
    hypeText('DM before it\'s gone','ALMOST GONE — DM NOW! '+E('fire'))
  );
  const h=`${E('header_last')} ${B(`${name} — ${hypeText(qtyText,qtyText.toUpperCase())}`)}`.trim();
  const urgency=hypeText(
    `${E('status_low')} ${qtyText} Don't miss out.`.trim(),
    `${E('status_low')} ${qtyText.toUpperCase()} GET YOURS BEFORE THEY'RE GONE! ${E('fire')}`.trim()
  );
  let body;
  if(S.mode==='variant'){
    body=getVariantLines()||getOutOfStockBlock();
  } else {
    body=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n')||getOutOfStockBlock();
  }
  return assembleSingle(h, `${urgency}\n\n${body}`);
}

function buildReview() {
  const name=S.name||'—';
  const q=S.review.quote||'Great product!';
  const reviewer=S.review.reviewer;
  const stars=S.review.stars;
  const starStr=stars?E('star').repeat(stars)||('★'.repeat(stars)):'';
  if(isShort()) return buildShort(
    `${E('header_review')} "${q.slice(0,60)}${q.length>60?'...':''}"`.trim(),
    `${name}${reviewer?' — '+reviewer:''}${getSig()}`
  );
  const h=`${E('header_review')} ${B(name)} — Customer Review`.trim();
  let reviewBody='';
  if(starStr) reviewBody+=`${starStr}\n`;
  reviewBody+=`"${q}"`;
  if(reviewer) reviewBody+=`\n— ${reviewer}`;
  let priceBody;
  if(S.mode==='variant'){
    priceBody=getVariantLines();
  } else {
    priceBody=[getWBlock(),getRBlock()].filter(Boolean).join('\n\n');
  }
  const full=priceBody?`${reviewBody}\n\n${priceBody}`:reviewBody;
  return assembleSingle(h, full);
}

// ═══════════════════════════════════════
// INSTAGRAM HASHTAG APPEND
// ═══════════════════════════════════════
function maybeAddHashtags(text) {
  if(S.network!=='instagram') return text;
  const name=(S.name||'product').toLowerCase().replace(/[^a-z0-9]/g,'');
  const tags=['#'+name,'#shopnow','#deals','#wholesale','#retail'].filter(t=>t!=='#');
  return text+'\n.\n.\n.\n'+tags.join(' ');
}

// ═══════════════════════════════════════
// PREVIEW ENGINE
// ═══════════════════════════════════════
function regen() {
  if(S.previewEdited) return;
  if(!S.type){
    document.getElementById('previewBox').value='Pick a platform and caption type...';
    updateCharCounter(); return;
  }
  const def=REGISTRY.find(r=>r.id===S.type);
  if(!def) return;
  let text=def.build();
  // clean up double spaces from empty emojis
  text=text.replace(/  +/g,' ').replace(/^ /gm,'');
  text=maybeAddHashtags(text);
  document.getElementById('previewBox').value=text;
  updateCharCounter();
}

function onPreviewEdit() {
  if(!S.type)return;
  S.previewEdited=true;
  document.getElementById('resetPill').classList.add('show');
  updateCharCounter();
}
function resetPreview() {
  S.previewEdited=false;
  document.getElementById('resetPill').classList.remove('show');
  regen();
}

function updateCharCounter() {
  const el=document.getElementById('charCounter');
  const ml=maxLen();
  if(!ml){ el.classList.remove('show'); return; }
  const len=document.getElementById('previewBox').value.length;
  el.textContent=`${len}/${ml}`;
  el.classList.add('show');
  el.classList.toggle('warn', len>ml*0.8 && len<=ml);
  el.classList.toggle('over', len>ml);
}

// ═══════════════════════════════════════
// COPY
// ═══════════════════════════════════════
function doCopy() {
  const text=document.getElementById('previewBox').value;
  if(!text||text==='Pick a platform and caption type...') return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='Copied!'; btn.classList.add('done');
    setTimeout(()=>{ btn.textContent='Copy Caption'; btn.classList.remove('done'); },2500);
  });
}

initNetworks();
initCfgFields();
